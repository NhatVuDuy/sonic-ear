<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#1a0a2e"/>
  <!-- piano body -->
  <rect x="72" y="256" width="368" height="184" rx="20" fill="#2d1b4e"/>
  <!-- white keys -->
  <rect x="84"  y="264" width="44" height="160" rx="8" fill="#f5f0ff"/>
  <rect x="132" y="264" width="44" height="160" rx="8" fill="#f5f0ff"/>
  <rect x="180" y="264" width="44" height="160" rx="8" fill="#f5f0ff"/>
  <rect x="228" y="264" width="44" height="160" rx="8" fill="#f5f0ff"/>
  <rect x="276" y="264" width="44" height="160" rx="8" fill="#f5f0ff"/>
  <rect x="324" y="264" width="44" height="160" rx="8" fill="#f5f0ff"/>
  <rect x="372" y="264" width="44" height="160" rx="8" fill="#f5f0ff"/>
  <!-- black keys -->
  <rect x="114" y="264" width="32" height="96" rx="6" fill="#1a0a2e"/>
  <rect x="162" y="264" width="32" height="96" rx="6" fill="#1a0a2e"/>
  <rect x="258" y="264" width="32" height="96" rx="6" fill="#1a0a2e"/>
  <rect x="306" y="264" width="32" height="96" rx="6" fill="#1a0a2e"/>
  <rect x="354" y="264" width="32" height="96" rx="6" fill="#1a0a2e"/>
  <!-- music note (large) -->
  <circle cx="192" cy="164" r="28" fill="#a855f7"/>
  <rect x="218" y="72" width="16" height="100" rx="8" fill="#a855f7"/>
  <rect x="218" y="72" width="64" height="18" rx="8" fill="#a855f7"/>
  <circle cx="282" cy="148" r="20" fill="#a855f7"/>
  <!-- glow rings -->
  <circle cx="192" cy="164" r="44" fill="#a855f7" opacity="0.15"/>
  <circle cx="282" cy="148" r="34" fill="#c084fc" opacity="0.15"/>
  <!-- ear wave -->
  <path d="M96 196 Q128 148 160 196" stroke="#22d3ee" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M80 208 Q128 136 176 208" stroke="#22d3ee" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
